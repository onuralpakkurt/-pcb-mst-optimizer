services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - ai-service
    networks:
      - pcb-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - pcb-net

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - pcb-net

networks:
  pcb-net:
    driver: bridge
